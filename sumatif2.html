<html>
<head>
    <title>Form Pendaftaran</title>
    <link rel="stylesheet" style="text/css" href="sumatif2.css">
</head>
<body>

<div class="container">
    <div class="form-box">
        <h2>Form Pendaftaran</h2>

        <form>
            <label>Nama:</label><br>
            <input type="text" name="nama"><br><br>

            <label>Kelas:</label><br>
            <input type="text" name="kelas"><br><br>

            <label>Umur:</label><br>
            <input type="checkbox" name="umur" value="10-12"> 10-12 tahun<br>
			<input type="checkbox" name="umur" value="15-16"> 15-16 tahun<br>
			<input type="checkbox" name="umur" value="16-17"> 16-17 tahun<br><br>

            <label>Jenis Kelamin:</label><br>
			<input type="radio" name="jk" value="Laki-laki"> Laki-laki<br>
			<input type="radio" name="jk" value="Perempuan"> Perempuan<br><br>

            <label>Tingkatan:</label><br>
            <input type="checkbox" name="tingkat" value="SD"> SD<br>
			<input type="checkbox" name="tingkat" value="SMP"> SMP<br>
			<input type="checkbox" name="tingkat" value="SMA"> SMA<br><br>

            <button type="submit">Daftar</button>
        </form>
    </div>
</div>

<script src="sumatif2.js"></script>
</body>
</html>
